<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .card { transition: box-shadow 0.2s; }
    .card:hover { box-shadow: 0 4px 24px 0 rgba(0,0,0,0.07); }
    input, textarea, select { outline: none; }
    input:focus, textarea:focus, select:focus {
      box-shadow: 0 0 0 2px #a1a1aa;
    }
    .drag-handle { cursor: grab; }
    .drag-handle:active { cursor: grabbing; }
    .dragging { opacity: 0.4; }
    .drag-over { border-top: 2px solid #18181b !important; }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #18181b; color: #fff; padding: 10px 22px; border-radius: 999px;
      font-size: 13px; opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 9999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .spinner {
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      width: 14px; height: 14px;
      animation: spin 0.6s linear infinite;
      display: inline-block; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-800">

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- ========== LOGIN SCREEN ========== -->
<div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-zinc-900 mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.955 11.955 0 003 12c0 6.627 5.373 12 12 12s12-5.373 12-12c0-2.274-.636-4.4-1.74-6.21"/>
        </svg>
      </div>
      <h1 class="text-xl font-semibold text-zinc-900">Admin Panel</h1>
      <p class="text-sm text-zinc-400 mt-1 font-light">กรอกข้อมูล GitHub เพื่อเข้าสู่ระบบ</p>
    </div>

    <div class="bg-white rounded-2xl border border-zinc-200 p-6 flex flex-col gap-4">
      <div>
        <label class="block text-xs font-medium text-zinc-500 mb-1.5">GitHub Username</label>
        <input id="inp-user" type="text" placeholder="octocat"
          class="w-full px-3 py-2.5 rounded-lg border border-zinc-200 text-sm bg-zinc-50 focus:bg-white transition"/>
      </div>
      <div>
        <label class="block text-xs font-medium text-zinc-500 mb-1.5">Repository Name</label>
        <input id="inp-repo" type="text" placeholder="my-web-app"
          class="w-full px-3 py-2.5 rounded-lg border border-zinc-200 text-sm bg-zinc-50 focus:bg-white transition"/>
      </div>
      <div>
        <label class="block text-xs font-medium text-zinc-500 mb-1.5">Branch</label>
        <input id="inp-branch" type="text" placeholder="main" value="main"
          class="w-full px-3 py-2.5 rounded-lg border border-zinc-200 text-sm bg-zinc-50 focus:bg-white transition"/>
      </div>
      <div>
        <label class="block text-xs font-medium text-zinc-500 mb-1.5">
          GitHub Personal Access Token
          <a href="https://github.com/settings/tokens/new?scopes=repo&description=AdminPanel" target="_blank"
            class="ml-1 text-blue-500 hover:underline">สร้าง Token</a>
        </label>
        <input id="inp-token" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
          class="w-full px-3 py-2.5 rounded-lg border border-zinc-200 text-sm bg-zinc-50 focus:bg-white transition font-mono"/>
        <p class="text-xs text-zinc-400 mt-1">Token ถูกเก็บแค่ใน localStorage เครื่องนี้</p>
      </div>
      <div id="login-error" class="hidden text-xs text-rose-500 bg-rose-50 rounded-lg px-3 py-2"></div>
      <button onclick="handleLogin()" id="login-btn"
        class="w-full py-2.5 bg-zinc-900 hover:bg-zinc-700 text-white text-sm font-medium rounded-xl transition mt-1">
        เข้าสู่ระบบ
      </button>
    </div>
    <p class="text-center text-xs text-zinc-300 mt-4">ข้อมูลถูกบันทึกเฉพาะในเครื่องนี้</p>
  </div>
</div>

<!-- ========== ADMIN SCREEN ========== -->
<div id="admin-screen" class="hidden min-h-screen">

  <!-- Topbar -->
  <header class="sticky top-0 z-50 bg-white/80 backdrop-blur border-b border-zinc-100">
    <div class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-sm font-semibold text-zinc-900">Admin Panel</span>
        <span class="text-xs text-zinc-400 font-mono" id="header-repo-label"></span>
      </div>
      <div class="flex items-center gap-2">
        <a href="index.html" target="_blank"
          class="text-xs text-zinc-500 hover:text-zinc-900 px-3 py-1.5 rounded-lg hover:bg-zinc-100 transition flex items-center gap-1.5">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
          ดูหน้าเว็บ
        </a>
        <button onclick="handleLogout()"
          class="text-xs text-zinc-500 hover:text-zinc-900 px-3 py-1.5 rounded-lg hover:bg-zinc-100 transition">
          ออกจากระบบ
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-8 flex flex-col gap-6">

    <!-- Site Info Card -->
    <section class="bg-white rounded-2xl border border-zinc-200 p-5">
      <h2 class="text-sm font-semibold text-zinc-700 mb-4 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        ข้อมูลเว็บไซต์
      </h2>
      <div class="flex flex-col gap-3">
        <div>
          <label class="block text-xs font-medium text-zinc-500 mb-1.5">ชื่อเว็บไซต์</label>
          <input id="cfg-title" type="text" placeholder="My App"
            class="w-full px-3 py-2 rounded-lg border border-zinc-200 text-sm bg-zinc-50 focus:bg-white transition"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-zinc-500 mb-1.5">คำอธิบาย (ใต้ชื่อ)</label>
          <input id="cfg-desc" type="text" placeholder="คำอธิบายสั้น ๆ"
            class="w-full px-3 py-2 rounded-lg border border-zinc-200 text-sm bg-zinc-50 focus:bg-white transition"/>
        </div>
      </div>
    </section>

    <!-- Buttons Section -->
    <section class="bg-white rounded-2xl border border-zinc-200 p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-zinc-700 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7"/>
          </svg>
          ปุ่มและลิงก์
        </h2>
        <button onclick="addButton()"
          class="flex items-center gap-1.5 text-xs font-medium bg-zinc-900 hover:bg-zinc-700 text-white px-3 py-1.5 rounded-lg transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
          เพิ่มปุ่ม
        </button>
      </div>

      <div id="buttons-list" class="flex flex-col gap-3">
        <!-- filled by JS -->
      </div>
      <p id="no-buttons" class="text-sm text-zinc-400 text-center py-6 hidden">ยังไม่มีปุ่ม · กด "เพิ่มปุ่ม" เพื่อเริ่ม</p>
    </section>

    <!-- Preview Section -->
    <section class="bg-white rounded-2xl border border-zinc-200 p-5">
      <h2 class="text-sm font-semibold text-zinc-700 mb-3 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
        พรีวิวปุ่ม
      </h2>
      <div id="preview-container" class="flex flex-col gap-2.5 max-w-xs mx-auto">
        <p class="text-xs text-zinc-400 text-center py-4">เพิ่มปุ่มเพื่อดูพรีวิว</p>
      </div>
    </section>

    <!-- Save Button -->
    <div class="flex flex-col gap-2 pb-8">
      <button onclick="saveConfig()" id="save-btn"
        class="w-full py-3 bg-zinc-900 hover:bg-zinc-700 text-white text-sm font-medium rounded-xl transition flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
        </svg>
        บันทึกและ Push ขึ้น GitHub
      </button>
      <p class="text-xs text-zinc-400 text-center">จะ commit ไปที่ <code class="bg-zinc-100 px-1 rounded" id="save-repo-label"></code> branch <code class="bg-zinc-100 px-1 rounded" id="save-branch-label"></code></p>
    </div>

  </main>
</div>

<script>
// =============================================
// State
// =============================================
let AUTH = { user: '', repo: '', branch: 'main', token: '' };
let config = { title: '', description: '', buttons: [] };
let fileSha = '';
let dragSrcIdx = null;

// =============================================
// Local Storage helpers
// =============================================
function saveAuth() {
  localStorage.setItem('gh_admin_auth', JSON.stringify(AUTH));
}
function loadAuth() {
  try {
    const a = JSON.parse(localStorage.getItem('gh_admin_auth') || '{}');
    if (a.user && a.token) { AUTH = a; return true; }
  } catch {}
  return false;
}

// =============================================
// Toast
// =============================================
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// =============================================
// Login / Logout
// =============================================
async function handleLogin() {
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');

  const user   = document.getElementById('inp-user').value.trim();
  const repo   = document.getElementById('inp-repo').value.trim();
  const branch = document.getElementById('inp-branch').value.trim() || 'main';
  const token  = document.getElementById('inp-token').value.trim();

  if (!user || !repo || !token) {
    errEl.textContent = 'กรุณากรอกข้อมูลให้ครบ';
    errEl.classList.remove('hidden');
    return;
  }

  btn.innerHTML = '<span class="spinner"></span> กำลังเชื่อมต่อ...';
  btn.disabled = true;

  try {
    // ทดสอบ token โดย GET repo info
    const res = await fetch(`https://api.github.com/repos/${user}/${repo}`, {
      headers: { Authorization: `Bearer ${token}`, 'X-GitHub-Api-Version': '2022-11-28' }
    });
    if (!res.ok) throw new Error(res.status === 401 ? 'Token ไม่ถูกต้อง' : res.status === 404 ? 'ไม่พบ Repository' : `Error ${res.status}`);

    AUTH = { user, repo, branch, token };
    saveAuth();
    await enterAdmin();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
    btn.innerHTML = 'เข้าสู่ระบบ';
    btn.disabled = false;
  }
}

function handleLogout() {
  localStorage.removeItem('gh_admin_auth');
  document.getElementById('admin-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  showToast('ออกจากระบบแล้ว');
}

// =============================================
// Enter Admin
// =============================================
async function enterAdmin() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('admin-screen').classList.remove('hidden');
  document.getElementById('header-repo-label').textContent = `${AUTH.user}/${AUTH.repo}`;
  document.getElementById('save-repo-label').textContent = `${AUTH.user}/${AUTH.repo}`;
  document.getElementById('save-branch-label').textContent = AUTH.branch;
  await loadConfigFromGitHub();
}

// =============================================
// GitHub API helpers
// =============================================
async function ghGet(path) {
  const res = await fetch(`https://api.github.com/repos/${AUTH.user}/${AUTH.repo}/contents/${path}?ref=${AUTH.branch}`, {
    headers: {
      Authorization: `Bearer ${AUTH.token}`,
      Accept: 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    }
  });
  return res;
}

async function ghPut(path, content, sha, message) {
  const body = {
    message,
    content: btoa(unescape(encodeURIComponent(content))),
    branch: AUTH.branch,
  };
  if (sha) body.sha = sha;

  const res = await fetch(`https://api.github.com/repos/${AUTH.user}/${AUTH.repo}/contents/${path}`, {
    method: 'PUT',
    headers: {
      Authorization: `Bearer ${AUTH.token}`,
      Accept: 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  return res;
}

// =============================================
// Load config.json from GitHub
// =============================================
async function loadConfigFromGitHub() {
  try {
    const res = await ghGet('config.json');
    if (res.status === 404) {
      // ไฟล์ยังไม่มี → ใช้ค่า default
      config = { title: 'My App', description: '', buttons: [] };
      fileSha = '';
    } else if (res.ok) {
      const data = await res.json();
      fileSha = data.sha;
      const decoded = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
      config = JSON.parse(decoded);
      config.buttons = config.buttons || [];
    } else {
      throw new Error(`HTTP ${res.status}`);
    }
  } catch (e) {
    config = { title: 'My App', description: '', buttons: [] };
    fileSha = '';
    showToast('โหลด config.json ไม่ได้ · สร้างใหม่อัตโนมัติ');
  }

  // Render UI
  document.getElementById('cfg-title').value = config.title || '';
  document.getElementById('cfg-desc').value  = config.description || '';
  renderButtonList();
  renderPreview();
}

// =============================================
// Save → GitHub
// =============================================
async function saveConfig() {
  const btn = document.getElementById('save-btn');
  btn.innerHTML = '<span class="spinner"></span> กำลัง Push...';
  btn.disabled = true;

  // อ่านค่าปัจจุบันจาก input
  config.title       = document.getElementById('cfg-title').value.trim() || 'My App';
  config.description = document.getElementById('cfg-desc').value.trim();

  const json = JSON.stringify(config, null, 2);
  const now  = new Date().toLocaleString('th-TH', { timeZone: 'Asia/Bangkok' });

  try {
    const res = await ghPut('config.json', json, fileSha, `Update config · ${now}`);
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    fileSha = data.content.sha;
    showToast('✓ บันทึกและ Push สำเร็จ!');
  } catch (e) {
    showToast(`❌ Error: ${e.message}`, 4000);
  } finally {
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg> บันทึกและ Push ขึ้น GitHub`;
    btn.disabled = false;
  }
}

// =============================================
// Button List Rendering
// =============================================
function renderButtonList() {
  const list = document.getElementById('buttons-list');
  const none = document.getElementById('no-buttons');
  list.innerHTML = '';

  if (!config.buttons.length) {
    none.classList.remove('hidden');
    renderPreview();
    return;
  }
  none.classList.add('hidden');

  config.buttons.forEach((btn, i) => {
    const card = document.createElement('div');
    card.className = 'card bg-zinc-50 border border-zinc-200 rounded-xl p-4 flex flex-col gap-3';
    card.setAttribute('draggable', 'true');
    card.dataset.idx = i;

    card.addEventListener('dragstart', e => { dragSrcIdx = i; card.classList.add('dragging'); });
    card.addEventListener('dragend', e => { card.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over')); });
    card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
    card.addEventListener('dragleave', e => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      if (dragSrcIdx === null || dragSrcIdx === i) return;
      const moved = config.buttons.splice(dragSrcIdx, 1)[0];
      config.buttons.splice(i, 0, moved);
      dragSrcIdx = null;
      renderButtonList();
      renderPreview();
    });

    card.innerHTML = `
      <div class="flex items-center gap-2">
        <span class="drag-handle text-zinc-300 hover:text-zinc-500 select-none" title="ลากเพื่อจัดเรียง">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 8h16M4 16h16"/>
          </svg>
        </span>
        <span class="text-xs font-medium text-zinc-500 flex-1">ปุ่ม #${i + 1}</span>
        <label class="flex items-center gap-1.5 text-xs text-zinc-500 cursor-pointer select-none">
          <input type="checkbox" ${btn.enabled ? 'checked' : ''} onchange="updateBtn(${i},'enabled',this.checked)"
            class="w-3.5 h-3.5 accent-zinc-900"/>
          แสดง
        </label>
        <button onclick="removeButton(${i})" class="text-zinc-300 hover:text-rose-400 transition p-1 rounded">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block text-xs text-zinc-400 mb-1">ข้อความปุ่ม</label>
          <input type="text" value="${escHtml(btn.label || '')}" placeholder="ดาวน์โหลดแอป"
            oninput="updateBtn(${i},'label',this.value)"
            class="w-full px-2.5 py-1.5 rounded-lg border border-zinc-200 text-xs bg-white focus:bg-white transition"/>
        </div>
        <div>
          <label class="block text-xs text-zinc-400 mb-1">ประเภท</label>
          <select onchange="updateBtn(${i},'type',this.value)"
            class="w-full px-2.5 py-1.5 rounded-lg border border-zinc-200 text-xs bg-white transition">
            <option value="link" ${btn.type==='link'?'selected':''}>🔗 ลิงก์เว็บ</option>
            <option value="web"  ${btn.type==='web'?'selected':''}>🌐 เว็บไซต์</option>
            <option value="download" ${btn.type==='download'?'selected':''}>⬇️ ดาวน์โหลด</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-xs text-zinc-400 mb-1">URL</label>
        <input type="url" value="${escHtml(btn.url || '')}" placeholder="https://example.com/file.zip"
          oninput="updateBtn(${i},'url',this.value)"
          class="w-full px-2.5 py-1.5 rounded-lg border border-zinc-200 text-xs bg-white focus:bg-white transition font-mono"/>
      </div>
      ${btn.type === 'download' ? `
      <div>
        <label class="block text-xs text-zinc-400 mb-1">ชื่อไฟล์ (เวลาโหลด)</label>
        <input type="text" value="${escHtml(btn.filename || '')}" placeholder="app-v1.0.zip"
          oninput="updateBtn(${i},'filename',this.value)"
          class="w-full px-2.5 py-1.5 rounded-lg border border-zinc-200 text-xs bg-white focus:bg-white transition font-mono"/>
      </div>` : ''}
      <div>
        <label class="block text-xs text-zinc-400 mb-1">สี</label>
        <div class="flex gap-2 flex-wrap">
          ${['default','blue','green','red','outline'].map(c => `
            <button onclick="updateBtn(${i},'color','${c}')"
              class="text-xs px-2.5 py-1 rounded-lg border transition ${btn.color===c ? 'ring-2 ring-zinc-900 ring-offset-1' : ''} ${colorClass(c)}">
              ${colorLabel(c)}
            </button>`).join('')}
        </div>
      </div>
    `;
    list.appendChild(card);
  });

  renderPreview();
}

function colorClass(c) {
  const m = {
    default: 'bg-zinc-900 text-white border-zinc-900',
    blue:    'bg-blue-600 text-white border-blue-600',
    green:   'bg-emerald-600 text-white border-emerald-600',
    red:     'bg-rose-600 text-white border-rose-600',
    outline: 'bg-white text-zinc-700 border-zinc-300',
  };
  return m[c] || m.default;
}
function colorLabel(c) {
  const m = { default:'ดำ', blue:'น้ำเงิน', green:'เขียว', red:'แดง', outline:'ขอบ' };
  return m[c] || c;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateBtn(idx, key, val) {
  config.buttons[idx][key] = val;
  // re-render card เฉพาะเมื่อเปลี่ยน type (เพื่อแสดง/ซ่อน filename field)
  if (key === 'type') renderButtonList();
  else renderPreview();
}

function addButton() {
  config.buttons.push({ label: 'ลิงก์ใหม่', url: '', type: 'link', color: 'default', enabled: true });
  renderButtonList();
}

function removeButton(idx) {
  config.buttons.splice(idx, 1);
  renderButtonList();
}

// =============================================
// Preview
// =============================================
function renderPreview() {
  const container = document.getElementById('preview-container');
  const title = document.getElementById('cfg-title').value || 'My App';

  const visibleBtns = config.buttons.filter(b => b.enabled);

  if (!visibleBtns.length) {
    container.innerHTML = '<p class="text-xs text-zinc-400 text-center py-4">เพิ่มปุ่มเพื่อดูพรีวิว</p>';
    return;
  }

  const icons = {
    download: `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3"/></svg>`,
    link:     `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 015.656 5.656l-3 3a4 4 0 01-5.656-5.656l1.5-1.5"/><path stroke-linecap="round" stroke-linejoin="round" d="M10.172 13.828a4 4 0 01-5.656-5.656l3-3a4 4 0 015.656 5.656l-1.5 1.5"/></svg>`,
    web:      `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>`,
  };

  const colorMap = {
    default: 'bg-zinc-900 text-white',
    blue:    'bg-blue-600 text-white',
    green:   'bg-emerald-600 text-white',
    red:     'bg-rose-600 text-white',
    outline: 'border border-zinc-300 text-zinc-800 bg-white',
  };

  container.innerHTML = `
    <p class="text-[10px] text-zinc-400 text-center mb-1 font-medium uppercase tracking-widest">Preview</p>
    <p class="text-sm font-semibold text-zinc-800 text-center mb-3">${escHtml(title)}</p>
    ${visibleBtns.map(btn => `
      <div class="flex items-center justify-between gap-3 w-full px-5 py-3 rounded-xl text-sm font-medium ${colorMap[btn.color] || colorMap.default}">
        <span>${escHtml(btn.label || 'ปุ่ม')}</span>
        ${icons[btn.type] || icons.link}
      </div>
    `).join('')}
  `;
}

// =============================================
// Init
// =============================================
window.addEventListener('DOMContentLoaded', () => {
  // auto-fill ถ้ามีใน localStorage
  if (loadAuth()) {
    document.getElementById('inp-user').value   = AUTH.user;
    document.getElementById('inp-repo').value   = AUTH.repo;
    document.getElementById('inp-branch').value = AUTH.branch;
    document.getElementById('inp-token').value  = AUTH.token;
  }

  // ถ้า URL มี ?autologin=1 ให้ login อัตโนมัติ
  const params = new URLSearchParams(location.search);
  if (params.get('autologin') === '1' && loadAuth()) {
    enterAdmin();
  }

  // live preview เมื่อแก้ site info
  ['cfg-title','cfg-desc'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', renderPreview);
  });
});
</script>
</body>
